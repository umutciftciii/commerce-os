services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: commerce_os
      POSTGRES_PASSWORD: commerce_os_password
      POSTGRES_DB: commerce_os
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce_os -d commerce_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @commerce-os/api-gateway dev
    env_file:
      - ../../.env.example
    environment:
      SERVICE_NAME: api-gateway
      DATABASE_URL: postgresql://commerce_os:commerce_os_password@postgres:5432/commerce_os?schema=public
      REDIS_URL: redis://redis:6379
      API_GATEWAY_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @commerce-os/worker dev
    env_file:
      - ../../.env.example
    environment:
      SERVICE_NAME: worker
      DATABASE_URL: postgresql://commerce_os:commerce_os_password@postgres:5432/commerce_os?schema=public
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[t]sx.*watch src/main.ts'"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy

  # --- Frontend web app'leri (Next.js dev runtime) ---------------------------
  # Backend ile ayni paylasimli node.Dockerfile imajini kullanir; her servis
  # ilgili workspace'i `next dev` ile calistirir. Uretim image optimizasyonu
  # kapsam disi (bkz. docs/DECISIONS.md ADR-019, docs/TODO.md production deploy).

  # Platform super admin konsolu. BFF route handler'lari gateway'e container
  # network'u uzerinden (api-gateway:4000) erisir; INTERNAL_API_TOKEN yalnizca
  # server env'inde tutulur (env_file), NEXT_PUBLIC ile client bundle'a girmez.
  admin-web:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @commerce-os/admin-web dev
    env_file:
      - ../../.env.example
    environment:
      SERVICE_NAME: admin-web
      NODE_ENV: development
      API_GATEWAY_URL: http://api-gateway:4000
    ports:
      - "3001:3001"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  # Magaza yoneticisi paneli. Faz 2B'den beri canli catalog/inventory API'sine
  # gateway uzerinden BFF deseniyle baglidir (API_GATEWAY_URL).
  store-admin-web:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @commerce-os/store-admin-web dev
    environment:
      SERVICE_NAME: store-admin-web
      NODE_ENV: development
      API_GATEWAY_URL: http://api-gateway:4000
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3002/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  # Genel storefront demo. F3A'dan beri canli katalog API'sine gateway uzerinden
  # sunucu-tarafi resolver ile baglidir. Platform-admin kimligiyle SUNUCUDA
  # oturum acar; token istemciye sizmaz (cookie yok). Kalici cozum gateway'de
  # public-read katalog ucudur (bkz. docs/TECHNICAL_DEBT.md).
  storefront-web:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @commerce-os/storefront-web dev
    environment:
      SERVICE_NAME: storefront-web
      NODE_ENV: development
      API_GATEWAY_URL: http://api-gateway:4000
      STOREFRONT_DEMO_STORE_SLUG: demo-store
      STOREFRONT_PLATFORM_EMAIL: platform-admin@example.local
      STOREFRONT_PLATFORM_PASSWORD: local-admin-password
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

volumes:
  postgres-data:
